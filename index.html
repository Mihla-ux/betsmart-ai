<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetSmart AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }
        h1 { color: #333; }
        .container { max-width: 600px; margin: auto; padding: 20px; background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background-color: #5cb85c; border: none; color: white; padding: 10px 15px; text-align: center; text-decoration: none; display: inline-block; margin: 4px 2px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to BetSmart AI</h1>
        <p>Get the best betting tips powered by AI!</p>
        <button id="getTips">Get Tips</button>
        <div id="tips" style="margin-top: 20px;"></div>
    </div>
    <script>
        document.getElementById('getTips').onclick = function() {
            const tips = [
                'Tip 1: Always check the latest team news before betting.',
                'Tip 2: Don’t bet with your heart; use statistics! ',
                'Tip 3: Spread your bets to minimize risk.',
            ];
            const randomTip = tips[Math.floor(Math.random() * tips.length)];
            document.getElementById('tips').innerText = randomTip;
        };
    </script>
</body>
</html>
